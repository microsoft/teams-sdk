name: Bug Report
description: Report a bug or issue across all three languages of the Teams SDK
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! If you have only experienced the issue in one language, please use the language-specific repo to file your issue. Otherwise please fill out the information below.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is
      placeholder: Tell us what you see!
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Install package '...'
        2. Run code '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: SDK Version
      description: Which version of the Teams SDK are you using?
      placeholder: e.g., 1.0.0
    validations:
      required: true

  - type: dropdown
    id: tested-languages
    attributes:
      label: Languages Affected
      description: Which languages did you see this bug in?
      multiple: true
      options:
        - TypeScript
        - C#
        - Python
        - All
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context about the problem here (logs, screenshots, etc.)
    validations:
      required: false
