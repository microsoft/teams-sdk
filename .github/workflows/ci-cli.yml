name: CI - CLI

on:
  pull_request:
    branches:
      - main
    paths:
      - 'packages/cli/**'
      - 'package-lock.json'

jobs:
  build-cli:
    name: Build & Test CLI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build CLI
        run: npx turbo build --filter=@microsoft/teams.cli

      - name: Test CLI
        run: npx turbo test --filter=@microsoft/teams.cli
