name: Release CLI

on:
  workflow_dispatch:
  push:
    branches:
      - 'release/v*'
    paths:
      - 'packages/cli/src/**'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dotnet/nbgv@master
        id: nbgv
        with:
          path: packages/cli
          stamp: packages/cli/package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - run: npm ci

      - name: Build CLI
        run: npx turbo build --filter=@microsoft/teams.cli

      - name: Test CLI
        run: npx turbo test --filter=@microsoft/teams.cli

      - name: Pack
        working-directory: packages/cli
        run: npm pack && mv microsoft-teams.cli-*.tgz teamscli.tgz

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: v${{ steps.nbgv.outputs.SimpleVersion }}
        run: |
          gh release create "$VERSION" packages/cli/teamscli.tgz \
            --title "$VERSION" \
            --generate-notes \
            --latest
